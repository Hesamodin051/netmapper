<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Mapper</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; height: 100vh; }

        #toolbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: #161b22;
            padding: 12px 20px;
            border-radius: 40px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(10px);
            min-width: 280px;
        }
        .toolbar-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }
        #toolbar input {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-family: monospace;
            outline: none;
            transition: 0.3s;
            flex: 0 1 auto;
            min-width: 100px;
        }
        #toolbar input:focus { border-color: #58a6ff; }
        #toolbar button {
            background: #238636;
            border: none;
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
            white-space: nowrap;
        }
        #toolbar button:hover { background: #2ea043; transform: scale(1.02); }
        #toolbar button:disabled { background: #484f58; cursor: not-allowed; transform: none; }
        #toolbar #searchInput { min-width: 160px; flex: 1; }
        .export-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-family: monospace;
            white-space: nowrap;
        }
        .export-btn:hover { background: #30363d; color: #c9d1d9; border-color: #58a6ff; }
        .export-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .export-group { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
        .history-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #d29922;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-family: monospace;
        }
        .history-btn:hover { background: #30363d; border-color: #d29922; }

        #history-panel {
            position: fixed;
            top: 90px;
            right: 25px;
            width: 340px;
            max-height: 400px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 16px;
            z-index: 120;
            display: none;
            overflow-y: auto;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
        }
        #history-panel::-webkit-scrollbar { width: 4px; }
        #history-panel::-webkit-scrollbar-track { background: #161b22; }
        #history-panel::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        #history-panel .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #21262d;
            padding-bottom: 8px;
        }
        #history-panel .history-header h4 { color: #f0f6fc; font-weight: 500; }
        #history-panel .history-header button {
            background: #21262d;
            border: 1px solid #30363d;
            color: #f85149;
            padding: 2px 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 11px;
        }
        #history-panel .history-header button:hover { background: #30363d; }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            border-bottom: 1px solid #1c2128;
            border-radius: 4px;
            transition: 0.2s;
        }
        .history-item:hover { background: #1c2128; }
        .history-item-info { display: flex; flex-direction: column; gap: 1px; }
        .history-item-range { font-size: 13px; color: #f0f6fc; font-family: monospace; }
        .history-item-time { font-size: 11px; color: #484f58; }
        .history-item-count { font-size: 11px; color: #8b949e; }
        .history-item-actions { display: flex; gap: 4px; }
        .history-item-actions button {
            background: transparent;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 2px 8px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 11px;
            transition: 0.2s;
        }
        .history-load-btn:hover { background: #238636; color: white; border-color: #238636; }
        .history-delete-btn:hover { background: #da3633; color: white; border-color: #da3633; }

        #graph { width: 100vw; height: 100vh; display: block; }
        #details-panel {
            position: fixed;
            right: 25px;
            top: 80px;
            width: 380px;
            max-width: 90vw;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 22px;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
            z-index: 1000;
            display: none;
            max-height: 80vh;
            overflow-y: auto;
            backdrop-filter: blur(12px);
        }
        #details-panel .close-btn { float: right; background: #da3633; border: none; color: white; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; line-height: 1.6; }
        #details-panel .close-btn:hover { background: #f85149; }
        #details-panel h3 { margin-top: 0; color: #f0f6fc; border-bottom: 2px solid #30363d; padding-bottom: 12px; font-weight: 500; }
        #details-content { display: flex; flex-direction: column; gap: 8px; }
        .detail-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #21262d; font-size: 14px; }
        .detail-label { color: #8b949e; }
        .detail-value { font-weight: 500; word-break: break-all; text-align: right; }
        .port-badge { background: #21262d; padding: 4px 12px; border-radius: 20px; font-family: monospace; font-size: 13px; border: 1px solid #30363d; display: inline-block; margin: 2px; }
        .port-container { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
        .online { color: #3fb950; }
        .offline { color: #f85149; }
        .gateway-yes { color: #d29922; }
        #status-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #161b22; border: 1px solid #30363d; padding: 12px 24px; border-radius: 30px; font-size: 14px; z-index: 50; backdrop-filter: blur(8px); }
        #monitor-status { position: fixed; bottom: 30px; right: 30px; background: #161b22; border: 1px solid #30363d; padding: 8px 16px; border-radius: 20px; font-size: 12px; z-index: 100; color: #3fb950; }
        #legend {
            position: fixed;
            bottom: 80px;
            left: 25px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 14px 18px;
            color: #c9d1d9;
            font-size: 12px;
            z-index: 100;
            min-width: 160px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            user-select: none;
        }
        #legend .legend-title { font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid #30363d; padding-bottom: 6px; font-size: 13px; color: #f0f6fc; }
        #legend .legend-item { display: flex; align-items: center; gap: 10px; padding: 3px 0; font-size: 12px; }
        #legend .legend-color { display: inline-block; width: 14px; height: 14px; border-radius: 50%; border: 1px solid #30363d; flex-shrink: 0; }
        #console-toggle {
            position: fixed;
            bottom: 80px;
            right: 30px;
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            z-index: 150;
            transition: 0.3s;
            font-family: monospace;
        }
        #console-toggle:hover { background: #30363d; }
        #console-panel {
            position: fixed;
            bottom: 130px;
            right: 30px;
            width: 550px;
            max-width: 90vw;
            max-height: 350px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 12px 16px;
            z-index: 200;
            display: none;
            overflow-y: auto;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: #c9d1d9;
            box-shadow: 0 8px 40px rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
        }
        #console-panel::-webkit-scrollbar { width: 4px; }
        #console-panel::-webkit-scrollbar-track { background: #161b22; }
        #console-panel::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        #console-panel .log-entry { padding: 1px 0; border-bottom: 1px solid #161b22; white-space: pre-wrap; word-break: break-all; }
        #console-panel .log-info { color: #58a6ff; }
        #console-panel .log-success { color: #3fb950; }
        #console-panel .log-warning { color: #d29922; }
        #console-panel .log-error { color: #f85149; }
        #console-panel .log-scan { color: #a371f7; }
        #console-panel .log-status { color: #79c0ff; }
        #console-panel .log-time { color: #484f58; margin-right: 10px; font-size: 10px; }
        #console-clear { position: sticky; top: 0; float: right; background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 2px 10px; border-radius: 12px; cursor: pointer; font-size: 11px; z-index: 5; }
        #console-clear:hover { background: #30363d; color: #c9d1d9; }
        #console-count { color: #484f58; font-size: 11px; margin-right: 8px; }
        .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #link-tooltip {
            position: fixed;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 12px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #c9d1d9;
            pointer-events: none;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            max-width: 300px;
        }

        .security-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        .security-critical { background: #da3633; color: white; }
        .security-high { background: #d29922; color: white; }
        .security-medium { background: #f0883e; color: white; }
        .security-low { background: #58a6ff; color: white; }
        .security-none { background: #3fb950; color: white; }

        @media (max-width: 640px) {
            #toolbar { padding: 10px 14px; width: 95%; top: 10px; border-radius: 20px; }
            .toolbar-row { gap: 6px; }
            #toolbar input { width: 100%; min-width: unset; font-size: 12px; padding: 5px 10px; }
            #toolbar #searchInput { min-width: unset; }
            .export-btn { font-size: 10px; padding: 3px 8px; }
            .history-btn { font-size: 10px; padding: 3px 8px; }
            #details-panel { width: 95%; right: 2.5%; top: 100px; max-height: 90vh; }
            #history-panel { width: 90%; right: 5%; top: 70px; max-height: 300px; }
            #legend { left: 10px; bottom: 70px; padding: 10px 14px; min-width: 130px; }
            #console-panel { width: 95%; right: 2.5%; bottom: 120px; max-height: 250px; }
            #console-toggle { right: 10px; bottom: 70px; }
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <div class="toolbar-row">
            <input type="text" id="subnetInput" placeholder="e.g. 192.168.1.0/24" value="192.168.67.0/24">
            <button id="scanBtn">▶ Scan</button>
            <button id="history-toggle" class="history-btn">📂 History</button>
        </div>
        <div class="toolbar-row">
            <input type="text" id="searchInput" placeholder="🔍 Search IP / Hostname">
        </div>
        <div class="toolbar-row export-group">
            <button id="exportJSON" class="export-btn" title="Export as JSON">📄 JSON</button>
            <button id="exportCSV" class="export-btn" title="Export as CSV">📊 CSV</button>
            <button id="exportPNG" class="export-btn" title="Export as PNG">🖼️ PNG</button>
            <button id="exportPDF" class="export-btn" title="Export as PDF">📄 PDF</button>
        </div>
    </div>

    <div id="graph"></div>

    <div id="status-msg">Ready</div>
    <div id="monitor-status">⏳ Connecting...</div>

    <div id="legend">
        <div class="legend-title">🎨 Color Key</div>
        <div class="legend-item"><span class="legend-color" style="background: #d29922;"></span> Gateway</div>
        <div class="legend-item"><span class="legend-color" style="background: #58a6ff;"></span> Open Ports</div>
        <div class="legend-item"><span class="legend-color" style="background: #3fb950;"></span> Subnet A / Mobile</div>
        <div class="legend-item"><span class="legend-color" style="background: #f0883e;"></span> Subnet B / Other</div>
        <div class="legend-item"><span class="legend-color" style="background: #8b949e;"></span> Standard Device</div>
        <div class="legend-item"><span class="legend-color" style="background: #ffcc00; border-color: #ffcc00;"></span> 🔍 Highlighted</div>
    </div>

    <div id="history-panel">
        <div class="history-header">
            <h4>📂 Scan History</h4>
            <div>
                <span id="history-count" style="color: #484f58; font-size: 12px; margin-right: 8px;">0</span>
                <button onclick="clearHistory()">Clear All</button>
            </div>
        </div>
        <div id="history-list"></div>
    </div>

    <button id="console-toggle">📋 Console</button>
    <div id="console-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; border-bottom: 1px solid #21262d; padding-bottom: 4px;">
            <span style="font-weight: bold; color: #f0f6fc; font-family: sans-serif;">💻 Live Console</span>
            <div>
                <span id="console-count">0 logs</span>
                <button id="console-clear">Clear</button>
            </div>
        </div>
        <div id="console-content"></div>
    </div>

    <div id="details-panel">
        <button class="close-btn" onclick="closeDetails()">✕</button>
        <h3>📡 Device Details</h3>
        <div id="details-content">
            <div class="detail-row"><span class="detail-label">IP Address</span><span class="detail-value" id="d-ip">-</span></div>
            <div class="detail-row"><span class="detail-label">MAC</span><span class="detail-value" id="d-mac">-</span></div>
            <div class="detail-row"><span class="detail-label">Hostname</span><span class="detail-value" id="d-hostname">-</span></div>
            <div class="detail-row"><span class="detail-label">Category</span><span class="detail-value" id="d-category">-</span></div>
            <div class="detail-row"><span class="detail-label">Vendor</span><span class="detail-value" id="d-vendor">-</span></div>
            <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value" id="d-status">-</span></div>
            <div class="detail-row"><span class="detail-label">Latency (RTT)</span><span class="detail-value" id="d-latency">-</span></div>
            <div class="detail-row"><span class="detail-label">Uptime</span><span class="detail-value" id="d-uptime">-</span></div>
            <div class="detail-row"><span class="detail-label">Gateway</span><span class="detail-value" id="d-gateway">-</span></div>
            <div class="detail-row" style="flex-direction: column; align-items: stretch; gap: 6px;">
                <span class="detail-label">Open Ports</span>
                <div class="port-container" id="d-ports"></div>
            </div>
            <!-- ===== دکمه و بخش تحلیل امنیتی (اضافه شد) ===== -->
            <div class="detail-row" style="flex-direction: column; align-items: stretch; gap: 6px; border-bottom: none; margin-top: 4px;">
                <button id="security-check-btn" style="
                    background: #21262d;
                    border: 1px solid #f0883e;
                    color: #f0883e;
                    padding: 6px 14px;
                    border-radius: 20px;
                    cursor: pointer;
                    font-size: 13px;
                    font-family: monospace;
                    transition: 0.3s;
                    width: 100%;
                " onmouseover="this.style.background='#30363d'" onmouseout="this.style.background='#21262d'">
                    🔒 Check Security
                </button>
            </div>
            <div id="security-results" style="display: none; margin-top: 4px; padding: 8px; background: #0d1117; border-radius: 8px; border: 1px solid #21262d; max-height: 250px; overflow-y: auto; font-size: 12px;">
                <div id="security-results-content"></div>
            </div>
        </div>
    </div>

    <div id="link-tooltip"><div id="link-tooltip-content"></div></div>

    <!-- ===== کتابخانه‌های خارجی ===== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.13/jspdf.plugin.autotable.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="script.js"></script>

    <!-- ===== کنسول و پولینگ ===== -->
    <script>
        let pollingInterval = null;
        let consolePollingInterval = null;
        let lastLogTimestamp = 0;
        let isConsoleVisible = false;
        const monitorStatusEl = document.getElementById('monitor-status');
        const consolePanel = document.getElementById('console-panel');
        const consoleContent = document.getElementById('console-content');
        const consoleToggle = document.getElementById('console-toggle');
        const consoleCount = document.getElementById('console-count');

        consoleToggle.addEventListener('click', () => {
            isConsoleVisible = !isConsoleVisible;
            consolePanel.style.display = isConsoleVisible ? 'block' : 'none';
            consoleToggle.textContent = isConsoleVisible ? '📋 Hide Console' : '📋 Console';
            if (isConsoleVisible) { scrollConsoleToBottom(); }
        });

        document.getElementById('console-clear').addEventListener('click', () => {
            consoleContent.innerHTML = '';
            lastLogTimestamp = 0;
            consoleCount.textContent = '0 logs';
        });

        function scrollConsoleToBottom() {
            const panel = document.getElementById('console-panel');
            panel.scrollTop = panel.scrollHeight;
        }

        function updateMonitorStatus(text, color) {
            monitorStatusEl.textContent = text;
            monitorStatusEl.style.color = color || '#3fb950';
        }

        async function fetchLogs() {
            try {
                const response = await fetch(`/api/logs?since=${lastLogTimestamp}`);
                if (!response.ok) throw new Error('Failed to fetch logs');
                const data = await response.json();
                if (data.logs && data.logs.length > 0) {
                    data.logs.forEach(log => {
                        appendLog(log.message, log.type, log.timestamp);
                    });
                    lastLogTimestamp = data.latestTimestamp;
                    consoleCount.textContent = `${consoleContent.children.length} logs`;
                    if (isConsoleVisible) { scrollConsoleToBottom(); }
                }
            } catch (error) { console.error('Log fetch error:', error); }
        }

        function appendLog(message, type, timestamp) {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type || 'info'}`;
            const time = new Date(timestamp).toLocaleTimeString();
            const iconMap = { 'info': 'ℹ️', 'success': '✅', 'warning': '⚠️', 'error': '❌', 'scan': '📡', 'status': '🔄' };
            const icon = iconMap[type] || '📝';
            entry.innerHTML = `<span class="log-time">${time}</span>${icon} ${message}`;
            consoleContent.appendChild(entry);
            while (consoleContent.children.length > 200) {
                consoleContent.removeChild(consoleContent.firstChild);
            }
        }

        function startConsolePolling() {
            if (consolePollingInterval) { clearInterval(consolePollingInterval); }
            fetchLogs();
            consolePollingInterval = setInterval(fetchLogs, 2000);
        }

        function startPolling() {
            if (pollingInterval) { clearInterval(pollingInterval); }
            updateMonitorStatus('🟢 Live (Polling)', '#3fb950');
            pollingInterval = setInterval(async () => {
                try {
                    const response = await fetch('/api/status');
                    if (!response.ok) throw new Error('Failed to fetch status');
                    const data = await response.json();
                    if (data.devices && data.devices.length > 0) {
                        updateNodeStatuses(data.devices);
                    }
                } catch (error) {
                    console.error('Polling error:', error);
                    updateMonitorStatus('🔴 Error', '#f85149');
                }
            }, 5000);
        }

        window.addEventListener('load', () => {
            startConsolePolling();
            setTimeout(startPolling, 3000);
            renderHistoryList();
        });

        window.addEventListener('beforeunload', () => {
            if (pollingInterval) clearInterval(pollingInterval);
            if (consolePollingInterval) clearInterval(consolePollingInterval);
        });
    </script>
</body>
</html>
